    <style>
        .search-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px;
        }

        .search-box {
            margin-bottom: 30px;
        }

        .search-box input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid var(--color-border);
            border-radius: 8px;
            font-size: 1.1em;
            background-color: var(--color-search-bg);
            color: var(--color-search-text);
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(33, 128, 140, 0.2);
        }

        .search-results {
            margin-top: 20px;
        }

        .result-item {
            padding: 20px;
            margin-bottom: 15px;
            background-color: var(--color-card-bg);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .result-item:hover {
            border-color: var(--color-primary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .result-item h3 {
            margin: 0 0 10px;
            color: var(--color-section-title);
        }

        .result-item h3 a {
            color: var(--color-section-title);
            text-decoration: none;
        }

        .result-item h3 a:hover {
            color: var(--color-primary);
        }

        .result-item .description {
            color: var(--color-section-desc);
            font-size: 0.95em;
        }

        .result-item .category {
            display: inline-block;
            padding: 3px 10px;
            background-color: var(--color-primary);
            color: white;
            border-radius: 4px;
            font-size: 0.8em;
            margin-top: 10px;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: var(--color-text-secondary);

        function searchClasses(searchTerm) {
            const resultsContainer = document.getElementById('search-results');
            
            if (!searchTerm) {
                resultsContainer.innerHTML = '<div class="no-results">请输入搜索关键词</div>';
                return;
            }

            const term = searchTerm.toLowerCase();
            let results = [];
            let categories = {
                '开发常用基类': [],
                'Manager 类': [],
                'Model 类': [],
                'Base 类': [],
                'AnimScript 类': []
            };

            // 搜索开发常用基类
            allClasses.common.forEach(cls => {
                if (cls.name.toLowerCase().includes(term) || cls.desc.toLowerCase().includes(term)) {
                    categories['开发常用基类'].push(cls);
                }
            });

            // 搜索Manager类
            allClasses.managers.forEach(cls => {
                if (cls.name.toLowerCase().includes(term) || cls.desc.toLowerCase().includes(term)) {
                    categories['Manager 类'].push(cls);
                }
            });

            // 搜索Model类
            allClasses.models.forEach(cls => {
                if (cls.name.toLowerCase().includes(term) || cls.desc.toLowerCase().includes(term)) {
                    categories['Model 类'].push(cls);
                }
            });

            // 搜索Base类
            allClasses.bases.forEach(cls => {
                if (cls.name.toLowerCase().includes(term) || cls.desc.toLowerCase().includes(term)) {
                    categories['Base 类'].push(cls);
                }
            });

            // 搜索AnimScript类
            allClasses.animscripts.forEach(cls => {
                if (cls.name.toLowerCase().includes(term) || cls.desc.toLowerCase().includes(term)) {
                    categories['AnimScript 类'].push(cls);
                }
            });

            // 生成结果HTML
            let html = '';
            for (const [category, items] of Object.entries(categories)) {
                if (items.length > 0) {
                    html += `<h2 style="margin: 20px 0 15px; color: var(--color-section-title);">${category} (${items.length})</h2>`;
                    items.forEach(item => {
                        html += `
                            <div class="result-item">
                                <h3><a href="${item.file}">${item.name}</a></h3>
                                <p class="description">${item.desc}</p>
                                <span class="category">${category}</span>
                            </div>
                        `;
                    });
                }
            }

            if (!html) {
                html = '<div class="no-results">没有找到匹配的类</div>';
            }

            resultsContainer.innerHTML = html;
        }

        // 监听搜索输入
        document.getElementById('search-input').addEventListener('input', function(e) {
            searchClasses(e.target.value);
        });
